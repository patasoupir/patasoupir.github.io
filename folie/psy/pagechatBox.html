<!doctype html>
<head>
  <meta charset="utf-8" />
  <title>Chatbot</title>
  <style>
    #chatbot {
      position: fixed;
      bottom: 10px;
      right: 10px;

      display: grid;
      grid-template-rows: 50px auto 50px;

      height: 600px;
      width: 600px;
      background-color: rgb(0, 225, 255);

      font-family: arial;
      border: blue 3px solid;
      border-radius: 10px;
    }
    #chatBox ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    #headerChatBox {
      display: flex;
      padding: 5px;
      font-size: 10pt;
      align-items: center;
      justify-content: space-between;
    }

    #conversation {
      display: flex;
      flex-direction: column;
      background-color: rgb(255, 255, 255);
      overflow-y: scroll;
      border-radius: 10px;
      .user,
      .bot {
        display: flex;
        flex-direction: row;

        p {
          margin: 5px;
          padding: 5px;
          border-radius: 10px;
        }
      }

      .user {
        justify-content: flex-end;

        p {
          background-color: rgb(11, 193, 203);
        }
      }

      .bot {
        justify-content: flex-start;

        p {
          background-color: rgb(124, 143, 209);
        }
      }
    }

    #input {
      display: flex;
      border-radius: 10px;

      form {
        display: contents;
      }

      input {
        display: block;
        margin: auto;
        width: calc(100% - 10px);
        height: calc(100% - 10px);
      }
    }
  </style>
</head>
<body>
  <div id="chatBox">
    <div id="chatbot">
      <div id="headerChatBox">
        <h1>Prendre RDV avec le Dr. Doute</h1>
        <div>x</div>
      </div>
      <div id="conversation">
        <div class="bot">
          <p>
            Bonjour, quand vous arrangerait-il de me rencontrer ? Proposez
            l'heure que vous voulez 😊
          </p>
        </div>
      </div>
      <div id="input">
        <form>
          <input type="text" placeholder="Répondre au docteur..." />
        </form>
      </div>
    </div>
  </div>
</body>
