<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="headfoot.css" />
    <title>porte</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        background-image: url("img/fon.png");
        background-size: cover;
        background-position: center;
        overflow: hidden;
        font-family: arial;
      }

      /* vidéo centrale */
      .video-wrap {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60vw;
        height: 35vw;
        max-width: 900px;
        max-height: 500px;
        z-index: 1;
      }

      .video-wrap video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* zones interactives */
      .hover-video {
        position: absolute;
        width: 320px;
        height: 180px;
        opacity: 0;
        transition: opacity 0.6s ease;
        z-index: 2;
        padding: 5px;
      }

      .hover-video iframe {
        width: 100%;
        height: 100%;
        pointer-events: auto;
        border: none;
      }

      /* apparition au survol */
      .hover-video:hover {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="page">
        <button><a href="cartuc.html"><< comeback</a></button>
      </div>
    </header>
    <!-- vidéo centrale -->
    <div class="video-wrap">
      <iframe
        width="500"
        height="300"
        src="https://www.youtube.com/embed/ghOxw0A0CUo?si=e9EF3c44M3cmtOs3"
        title="YouTube video player"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>

    <div class="reveal-zone" style="top: 30px; left: 40px"></div>
    <div class="hover-video" style="top: 30px; left: 40px">
      <iframe
        src="https://www.youtube.com/embed/Hk1WvL9651A"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
        "
        allowfullscreen
      >
      </iframe>
    </div>

    <!-- bas droite -->
    <div class="reveal-zone" style="bottom: 30px; right: 30px"></div>
    <div class="hover-video" style="bottom: 30px; right: 30px">
      <iframe
        src="https://www.youtube.com/embed/qS6L4uQKWqU"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
        "
        allowfullscreen
      >
      </iframe>
    </div>

    <!-- bouton -->
    <div class="page" id="nextButton">
      <button>
        <a href="villePirate.html">next >></a>
      </button>
    </div>
  </body>
</html>
